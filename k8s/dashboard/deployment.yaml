---
# IMPORTANT : remplacer YOUR_ORG par votre organisation GitHub
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: security-audit
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: dashboard
          image: ghcr.io/YOUR_ORG/audit-dashboard:YOUR_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - secretRef:
                name: audit-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
