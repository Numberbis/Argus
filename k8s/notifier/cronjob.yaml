---
# IMPORTANT : remplacer YOUR_ORG par votre organisation GitHub
apiVersion: batch/v1
kind: CronJob
metadata:
  name: notifier
  namespace: security-audit
  labels:
    app: security-audit
    component: notifier
spec:
  schedule: "*/15 * * * *"  # Toutes les 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300  # 5 minutes max
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: audit-scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: notifier
              image: ghcr.io/YOUR_ORG/audit-notifier:YOUR_TAG
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: audit-secrets
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
