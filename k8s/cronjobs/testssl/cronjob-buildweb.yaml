---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: testssl-buildweb
  namespace: security-audit
  labels:
    app: security-audit
    tool: testssl
    target: buildweb
spec:
  schedule: "0 2 * * *"  # Quotidien 02h00 (surveillance expiry TLS)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: audit-scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: testssl-scanner
              image: ghcr.io/YOUR_ORG/audit-testssl:YOUR_TAG
              imagePullPolicy: Always
              env:
                - name: TARGET_URL
                  value: "https://buildweb.fr"
                - name: TARGET_NAME
                  value: "buildweb"
                - name: COLLECTOR_URL
                  value: "http://collector:8080"
              envFrom:
                - secretRef:
                    name: audit-secrets
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
