---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: observatory-buildweb
  namespace: security-audit
  labels:
    app: security-audit
    tool: observatory
    target: buildweb
spec:
  schedule: "0 6 * * *"  # Quotidien 06h00 (rapide, API externe)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: audit-scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: observatory-scanner
              image: ghcr.io/YOUR_ORG/audit-observatory:YOUR_TAG
              imagePullPolicy: Always
              env:
                - name: TARGET_URL
                  value: "https://buildweb.fr"
                - name: TARGET_NAME
                  value: "buildweb"
                - name: COLLECTOR_URL
                  value: "http://collector:8080"
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
