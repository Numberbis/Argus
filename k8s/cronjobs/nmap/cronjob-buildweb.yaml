---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nmap-buildweb
  namespace: security-audit
  labels:
    app: security-audit
    tool: nmap
    target: buildweb
spec:
  schedule: "0 4 * * 3"  # Mercredi 04h00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: audit-scanner
          # Nmap nécessite les capacités réseau (NET_RAW)
          securityContext:
            runAsUser: 0
          containers:
            - name: nmap-scanner
              image: ghcr.io/YOUR_ORG/audit-nmap:YOUR_TAG
              imagePullPolicy: Always
              env:
                - name: TARGET_URL
                  value: "https://buildweb.fr"
                - name: TARGET_NAME
                  value: "buildweb"
                - name: TARGET_IP
                  value: ""
                - name: COLLECTOR_URL
                  value: "http://collector:8080"
              envFrom:
                - secretRef:
                    name: audit-secrets
              resources:
                requests:
                  cpu: "100m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              securityContext:
                capabilities:
                  add: ["NET_RAW", "NET_ADMIN"]
