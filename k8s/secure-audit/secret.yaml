# Secret contenant les identifiants et la configuration des utilisateurs.
# NE PAS committer avec de vraies valeurs — utiliser un gestionnaire de secrets
# (Sealed Secrets, External Secrets, Vault, etc.) en production.
#
# Pour encoder vos propres valeurs :
#   echo -n "valeur" | base64
#
# Pour encoder INITIAL_USERS :
#   echo -n '[{"username":"admin","password":"VotreMotDePasse"},...]' | base64 -w 0
#
# Valeurs encodées ci-dessous (mots de passe : "changeme" — À MODIFIER) :
#
#   SECRET_KEY     → "changez-cette-cle-secrete-en-production"
#   AUDIT_USERNAME → "admin"        (fallback si INITIAL_USERS absent)
#   AUDIT_PASSWORD → "changeme"     (fallback si INITIAL_USERS absent)
#   INITIAL_USERS  → JSON avec admin (illimité) + chez-meilan (restreint à chez-meilan.fr)

