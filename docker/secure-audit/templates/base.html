<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Secure Audit{% endblock %} — Build Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet" crossorigin="anonymous">
  <style>
    :root { --brand: #1a1a2e; }
    body { background: #f4f6f9; font-size: 0.92rem; }
    .navbar { background: var(--brand); }
    .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
    .navbar-brand span { color: #7ecfff; }
    footer.site-footer {
      border-top: 1px solid #dee2e6;
      padding: 1rem 0;
      text-align: center;
      color: #888;
      font-size: 0.82rem;
      margin-top: 3rem;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">
      🔒 Secure Audit <span>By Build Web</span>
    </a>
    {% if session.logged_in %}
    <div class="d-flex align-items-center gap-3">
      <span class="text-light opacity-75 small">{{ session.username }}</span>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Déconnexion</a>
    </div>
    {% endif %}
  </div>
</nav>

<main class="container-lg px-4 pb-5">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <strong>Build Web</strong> —
  <a href="mailto:contact@buildweb.fr">contact@buildweb.fr</a> —
  07 81 55 02 56
</footer>

</body>
</html>
