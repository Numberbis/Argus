name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:

  # ── Unit tests (fast, no database) ──────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run unit tests
        run: |
          mkdir -p reports/tests
          pytest tests/unit/ -v --tb=short --no-header \
            -m "not integration"

  # ── Integration tests (collector + PostgreSQL) ───────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: audit_test
          POSTGRES_USER: audit
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U audit -d audit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Apply DB schema
        env:
          PGPASSWORD: test
        run: |
          psql -h localhost -U audit -d audit_test -c "
            CREATE TABLE IF NOT EXISTS scans (
              id SERIAL PRIMARY KEY,
              tool VARCHAR(20) NOT NULL,
              target VARCHAR(100) NOT NULL,
              target_url TEXT NOT NULL,
              started_at TIMESTAMPTZ NOT NULL,
              finished_at TIMESTAMPTZ,
              status VARCHAR(20) NOT NULL DEFAULT 'running',
              raw_output JSONB
            );
            CREATE TABLE IF NOT EXISTS findings (
              id SERIAL PRIMARY KEY,
              scan_id INTEGER NOT NULL REFERENCES scans(id) ON DELETE CASCADE,
              severity VARCHAR(20) NOT NULL,
              title TEXT NOT NULL,
              description TEXT,
              url TEXT,
              cvss_score NUMERIC(4,1),
              cve_ids TEXT[] DEFAULT '{}',
              remediation TEXT,
              notified_at TIMESTAMPTZ
            );
            CREATE TABLE IF NOT EXISTS reports (
              id SERIAL PRIMARY KEY,
              generated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              report_type VARCHAR(20) NOT NULL,
              target VARCHAR(100),
              html_path TEXT,
              pdf_path TEXT
            );
          "

      - name: Run integration tests
        env:
          INTEGRATION_TEST_DB_URL: postgresql://audit:test@localhost:5432/audit_test
        run: |
          mkdir -p reports/tests
          pytest tests/integration/ -v --tb=short --no-header \
            -m "integration"

  # ── Docker build check ────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [collector, dashboard, notifier, report-generator, zap, nikto, nmap, testssl, nuclei, wpscan, trivy]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python files
        run: ruff check docker/ scripts/ tests/

      - name: Validate YAML configs
        run: |
          python -c "
          import yaml, sys, pathlib
          files = list(pathlib.Path('config').glob('*.yml'))
          errors = []
          for f in files:
              try:
                  yaml.safe_load(f.read_text())
                  print(f'  OK  {f}')
              except yaml.YAMLError as e:
                  errors.append(f'  FAIL {f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          "

      - name: Check shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  # ── Scan sécurité Trivy sur l'image collector ─────────────────────────────────
  security-scan:
    name: Scan sécurité Trivy
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image collector pour scan
        uses: docker/build-push-action@v5
        with:
          context: ./docker/collector
          push: false
          load: true
          tags: argus-collector:scan

      - name: Scan Trivy — CRITICAL + HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "argus-collector:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload SARIF vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Push GHCR (main seulement) ────────────────────────────────────────────────
  push-images:
    name: Push GHCR (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [integration-tests, docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [collector, dashboard, notifier, report-generator, zap, nikto, nmap, testssl, nuclei, wpscan, trivy]

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/argus-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/argus-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
