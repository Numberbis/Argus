[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/tests/report.html
    --self-contained-html
markers =
    integration: Tests nécessitant une base de données réelle
    unit: Tests unitaires sans dépendances externes
